niche: rocketleague
account:
  env_prefix: RL  # loads RL_API_KEY, RL_API_SECRET, RL_ACCESS_TOKEN, RL_ACCESS_TOKEN_SECRET

# ── Content sources ────────────────────────────────────────────────────────────
sources:

  # ── Official RSS / Web ───────────────────────────────────────────────────────

  - name: Steam News
    type: rss
    url: https://store.steampowered.com/feeds/news/app/252950
    poll_interval: 1800         # 30 min

  # ── Official X / Twitter accounts ───────────────────────────────────────────

  - name: "@RocketLeague"
    type: twitter
    account_id: RocketLeague
    poll_interval: 300

  - name: "@RLEsports"
    type: twitter
    account_id: RLEsports
    poll_interval: 300

  - name: "@PsyonixStudios"
    type: twitter
    account_id: PsyonixStudios
    poll_interval: 300          # official developer studio account

  - name: "@RLCS"
    type: twitter
    account_id: RLCS
    poll_interval: 300          # official RLCS competitive series

  - name: "@ShiftRLE"
    type: twitter
    account_id: ShiftRLE
    poll_interval: 300          # #1 RL esports news/intel source — breaks roster moves, results

  - name: "@ApparentlyJxck"
    type: twitter
    account_id: ApparentlyJxck
    poll_interval: 600          # top pro player, frequent competitive tweets

  - name: "@Flakes_RL"
    type: twitter
    account_id: Flakes_RL
    poll_interval: 600          # popular pro/content creator

  # ── Esports data APIs ────────────────────────────────────────────────────────

  - name: RL Flashbacks
    type: api
    collector: flashback
    poll_interval: 86400        # once per day — "on this day" historical content

  - name: RL Stat Milestones
    type: api
    collector: rl_stats
    poll_interval: 604800       # once per week — all-time stat leaderboard tweets

  # ── News / coverage sites ────────────────────────────────────────────────────

  - name: BLAST.tv RL News
    type: scraper
    url: https://blast.tv/rl/news
    poll_interval: 900          # 15 min — tournament news + results

  - name: ONE Esports RL
    type: scraper
    url: https://www.oneesports.gg/rocket-league/
    poll_interval: 1800

  - name: Dexerto RL
    type: scraper
    url: https://www.dexerto.com/rocket-league/
    poll_interval: 3600         # 1 hr — major gaming news outlet

  - name: The Loadout RL
    type: scraper
    url: https://www.theloadout.com/rocket-league
    poll_interval: 3600         # 1 hr — RL guides and patch coverage

  # ── YouTube ──────────────────────────────────────────────────────────────────

  - name: YouTube — RLEsports Official
    type: youtube
    channel_id: UCdKuPY64fEpI4cdlBSyvEJw
    poll_interval: 1800         # highlights, interviews, event clips

  - name: YouTube — SunlessKhan
    type: youtube
    channel_id: UCocHtA1ADT6kTObipYzJoww
    poll_interval: 1800         # patch analysis, news coverage, top channel

  - name: YouTube — Lethamyr
    type: youtube
    channel_id: UCkNYoWK1LqjFhxYI6BM_kOA
    poll_interval: 1800         # daily uploads, competitive analysis

  - name: YouTube — Musty (amustycow)
    type: youtube
    channel_id: UC1GFqqHIBaiCW1ivJJCFTvg
    poll_interval: 3600

  - name: YouTube — Wayton Pilkin
    type: youtube
    channel_id: UCeg2dFpnarFPI14hbN_5rKg
    poll_interval: 1800         # popular RL content creator and competitive player

  - name: YouTube — ApparentlyJack
    type: youtube
    channel_id: UCRi4YlWuLFCucOx_rk-ddsg
    poll_interval: 1800         # top pro, competitive analysis

  - name: YouTube — Flakes
    type: youtube
    channel_id: UCP9dqlEktObJ-ji-JOdGQhQ
    poll_interval: 3600         # pro player content, 1v1 specialist

# ── Posting schedule ───────────────────────────────────────────────────────────
posting:
  min_interval_seconds: 1200   # 20 min minimum between posts
  max_interval_seconds: 3600   # 60 min maximum
  max_daily_posts: 15
  breaking_news_override: true  # high-priority items skip the queue

# ── Hashtags by content type ───────────────────────────────────────────────────
hashtags:
  default:   ["#RocketLeague"]
  esports:   ["#RocketLeague", "#RLCS"]
  update:    ["#RocketLeague", "#RLUpdate"]
  item_shop: ["#RocketLeague", "#RLItemShop"]
