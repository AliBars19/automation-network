niche: rocketleague
account:
  env_prefix: RL  # loads RL_API_KEY, RL_API_SECRET, RL_ACCESS_TOKEN, RL_ACCESS_TOKEN_SECRET

# ── Content sources ────────────────────────────────────────────────────────────
sources:

  # ── Official RSS / Web ───────────────────────────────────────────────────────

  - name: Steam News
    type: rss
    url: https://store.steampowered.com/feeds/news/app/252950
    poll_interval: 1800         # 30 min

  # ── Official X / Twitter accounts (retweet: true) ─────────────────────────────

  - name: "@RocketLeague"
    type: twitter
    account_id: RocketLeague
    poll_interval: 300
    retweet: true

  - name: "@RLEsports"
    type: twitter
    account_id: RLEsports
    poll_interval: 300
    retweet: true

  - name: "@PsyonixStudios"
    type: twitter
    account_id: PsyonixStudios
    poll_interval: 300
    retweet: true

  - name: "@RLCS"
    type: twitter
    account_id: RLCS
    poll_interval: 300
    retweet: true

  - name: "@RL_Status"
    type: twitter
    account_id: RL_Status
    poll_interval: 600
    retweet: true

  # ── News / intel accounts (monitored — formatted as news, not retweeted) ────

  - name: "@ShiftRLE"
    type: twitter
    account_id: ShiftRLE
    poll_interval: 300          # #1 RL esports news/intel source

  - name: "@LiquipediaRL"
    type: twitter
    account_id: LiquipediaRL
    poll_interval: 300          # real-time tournament results, roster moves

  # @RocketBaguette removed — posts entirely in French, off-brand for English account

  - name: "@octane_gg"
    type: twitter
    account_id: octane_gg
    poll_interval: 600          # RL esports stats and match results

  - name: "@RLRecon"
    type: twitter
    account_id: RLRecon
    poll_interval: 600          # RL esports journalism, interviews, roster intel

  - name: "@RLGameNews"
    type: twitter
    account_id: RLGameNews
    poll_interval: 900          # RL news, item shops, leaks, updates

  - name: "@RLUpdate"
    type: twitter
    account_id: RLUpdate
    poll_interval: 900          # Community updates, RLCS media

  # ── Esports data APIs ────────────────────────────────────────────────────────

  - name: RL Flashbacks
    type: api
    collector: flashback
    poll_interval: 86400        # once per day

  - name: RL Stat Milestones
    type: api
    collector: rl_stats
    poll_interval: 604800       # once per week

  # ── News / coverage RSS ─────────────────────────────────────────────────────

  - name: Shift RLE Articles
    type: rss
    url: https://shiftrle.gg/feed/
    poll_interval: 900          # 15 min

  # ── News / coverage sites ──────────────────────────────────────────────────

  - name: BLAST.tv RL News
    type: scraper
    url: https://blast.tv/rl/news
    poll_interval: 900

  - name: ONE Esports RL
    type: scraper
    url: https://www.oneesports.gg/rocket-league/
    poll_interval: 1800

  - name: Dexerto RL
    type: scraper
    url: https://www.dexerto.com/rocket-league/
    poll_interval: 3600

  - name: The Loadout RL
    type: rss
    url: https://www.theloadout.com/rocket-league/feed
    poll_interval: 1800

  - name: Esports News UK RL
    type: rss
    url: https://esports-news.co.uk/category/rocket-league/feed/
    poll_interval: 3600

  # ── YouTube ──────────────────────────────────────────────────────────────────

  - name: YouTube — RLEsports Official
    type: youtube
    channel_id: UCdKuPY64fEpI4cdlBSyvEJw
    poll_interval: 1800

  - name: YouTube — SunlessKhan
    type: youtube
    channel_id: UCocHtA1ADT6kTObipYzJoww
    poll_interval: 1800

  - name: YouTube — Lethamyr
    type: youtube
    channel_id: UCkNYoWK1LqjFhxYI6BM_kOA
    poll_interval: 1800

  - name: YouTube — Musty (amustycow)
    type: youtube
    channel_id: UC1GFqqHIBaiCW1ivJJCFTvg
    poll_interval: 3600

  - name: YouTube — Wayton Pilkin
    type: youtube
    channel_id: UCeg2dFpnarFPI14hbN_5rKg
    poll_interval: 1800

  - name: YouTube — ApparentlyJack
    type: youtube
    channel_id: UCRi4YlWuLFCucOx_rk-ddsg
    poll_interval: 1800

  - name: YouTube — Flakes
    type: youtube
    channel_id: UCP9dqlEktObJ-ji-JOdGQhQ
    poll_interval: 3600

  - name: YouTube — JohnnyBoi_i
    type: youtube
    channel_id: UCldqb1GljWZzaRVtYXfvlAg
    poll_interval: 1800

  - name: YouTube — SquishyMuffinz
    type: youtube
    channel_id: UC1JPEwMqLaI96qRUKNp3_ow
    poll_interval: 1800

  - name: YouTube — ArsenalRL
    type: youtube
    channel_id: UCuRS9KcqyOamnYjd6zOKiFQ
    poll_interval: 1800

  # ── Reddit clips (community content) ─────────────────────────────────────

  - name: "Reddit r/RocketLeague clips"
    type: reddit_clips
    subreddit: RocketLeague
    min_score: 500
    poll_interval: 1800

# ── Posting schedule ───────────────────────────────────────────────────────────
# NOTE: RL account had a temporary reach label (shadowban) on 2026-04-02 due to
# mass deletion. When re-enabling RL sources, use these wider intervals to avoid
# triggering spam detection again. Max 8 posts/day during recovery period.
posting:
  min_interval_seconds: 1800
  max_interval_seconds: 4800
  max_daily_posts: 8
  breaking_news_override: true

# ── Hashtags by content type ───────────────────────────────────────────────────
hashtags:
  default:   ["#RocketLeague"]
  esports:   ["#RocketLeague", "#RLCS"]
  update:    ["#RocketLeague", "#RLUpdate"]
  item_shop: ["#RocketLeague", "#RLItemShop"]
