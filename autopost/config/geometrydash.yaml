niche: geometrydash
account:
  env_prefix: GD  # loads GD_API_KEY, GD_API_SECRET, GD_ACCESS_TOKEN, GD_ACCESS_TOKEN_SECRET

# ── Content sources ────────────────────────────────────────────────────────────
sources:

  # ── Official X / Twitter accounts (retweet: true) ─────────────────────────────

  - name: "@RobTopGames"
    type: twitter
    account_id: RobTopGames
    poll_interval: 300
    retweet: true

  - name: "@_GeometryDash"
    type: twitter
    account_id: _GeometryDash
    poll_interval: 300
    retweet: true

  - name: "@demonlistgd"
    type: twitter
    account_id: demonlistgd
    poll_interval: 600
    retweet: true

  - name: "@geode_sdk"
    type: twitter
    account_id: geode_sdk
    poll_interval: 600
    retweet: true

  # ── News / intel accounts (monitored — formatted as news, not retweeted) ────

  - name: "@today_gd"
    type: twitter
    account_id: today_gd
    poll_interval: 300          # very active daily GD news account

  - name: "@DashwordGD"
    type: twitter
    account_id: DashwordGD
    poll_interval: 600          # #1 GD community news outlet

  - name: "@DemonListNews"
    type: twitter
    account_id: DemonListNews
    poll_interval: 600          # automated demon completion announcements

  - name: "@demonlistorg"
    type: twitter
    account_id: demonlistorg
    poll_interval: 600          # Global Demonlist official — ranking changes

  - name: "@StatsGd"
    type: twitter
    account_id: StatsGd
    poll_interval: 600          # GD Stats — player rankings, country leaderboards

  - name: "@AREDLgd"
    type: twitter
    account_id: AREDLgd
    poll_interval: 600          # All Rated Extreme Demons List — rankings & changes

  - name: "@GDWTHub"
    type: twitter
    account_id: GDWTHub
    poll_interval: 900          # GD tournament coverage (European Cup, World Tournament)

  - name: "@GDWTournament"
    type: twitter
    account_id: GDWTournament
    poll_interval: 900          # GD World Tournament official

  - name: "@GD_22News"
    type: twitter
    account_id: GD_22News
    poll_interval: 900          # GD 2.2 news, patch notes, update coverage

  # ── Game update sources ──────────────────────────────────────────────────────

  - name: Steam News (GD)
    type: rss
    url: https://store.steampowered.com/feeds/news/app/322170
    poll_interval: 1800

  - name: RobTop Games Website
    type: scraper
    url: https://www.robtopgames.com/
    poll_interval: 3600

  # ── Demon list / level tracking APIs ────────────────────────────────────────

  - name: Pointercrate Demon List
    type: api
    collector: pointercrate
    base_url: https://pointercrate.com/api/v2
    poll_interval: 600

  # ── Level data API ─────────────────────────────────────────────────────────

  - name: GDBrowser
    type: api
    collector: gdbrowser
    base_url: https://gdbrowser.com/api
    poll_interval: 900

  # ── Mod / developer ecosystem ──────────────────────────────────────────────

  - name: Geode Mods Catalog
    type: api
    collector: geode_index
    min_downloads: 20000
    max_items: 4
    poll_interval: 3600

  - name: Geode SDK (GitHub releases)
    type: api
    collector: github
    repo: geode-sdk/geode
    poll_interval: 3600

  # ── YouTube channels ───────────────────────────────────────────────────────

  - name: GD YouTube — EVW
    type: youtube
    channel_id: UC_BXQNOzX7ALIf8FkDqOahQ
    poll_interval: 1800

  - name: GD YouTube — Wulzy
    type: youtube
    channel_id: UCoJzXOukwqP96D0Uczqf74Q
    poll_interval: 1800

  - name: GD YouTube — GD Colon
    type: youtube
    channel_id: UCFDsxSlQXpLLpVScy2NmbcQ
    poll_interval: 1800

  - name: GD YouTube — Nexus
    type: youtube
    channel_id: UCZwP1iUQiAKYQp5w-9mJb_w
    poll_interval: 1800

  - name: GD YouTube — ItzBran
    type: youtube
    channel_id: UC4DmiLg94JMXUZyc3uG5kMQ
    poll_interval: 1800

