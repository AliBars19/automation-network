niche: geometrydash
account:
  env_prefix: GD  # loads GD_API_KEY, GD_API_SECRET, GD_ACCESS_TOKEN, GD_ACCESS_TOKEN_SECRET

# ── Content sources ────────────────────────────────────────────────────────────
sources:

  # ── Official X / Twitter accounts ───────────────────────────────────────────

  - name: "@RobTopGames"
    type: twitter
    account_id: RobTopGames
    poll_interval: 300          # 5 min — rare but critical

  - name: "@_GeometryDash"
    type: twitter
    account_id: _GeometryDash
    poll_interval: 300          # official GD account

  - name: "@today_gd"
    type: twitter
    account_id: today_gd
    poll_interval: 300          # very active daily GD news account

  - name: "@demonlistgd"
    type: twitter
    account_id: demonlistgd
    poll_interval: 600          # Pointercrate demon list official updates

  - name: "@geode_sdk"
    type: twitter
    account_id: geode_sdk
    poll_interval: 600          # official Geode mod framework account — releases and updates

  - name: "@GDW_ORG"
    type: twitter
    account_id: GDW_ORG
    poll_interval: 900          # Geometry Dash World — level showcases and community news

  - name: "@vipringd"
    type: twitter
    account_id: vipringd
    poll_interval: 600          # Viprin — elder moderator, hosts official community events

  - name: "@zNpesta__"
    type: twitter
    account_id: zNpesta__
    poll_interval: 600          # npesta — iconic player, verification news, very active

  # ── Community news / creator X accounts ────────────────────────────────────

  - name: "@DashwordGD"
    type: twitter
    account_id: DashwordGD
    poll_interval: 600          # #1 GD community news outlet — demon completions, updates, events

  - name: "@DemonListNews"
    type: twitter
    account_id: DemonListNews
    poll_interval: 600          # automated demon completion announcements

  - name: "@demonlistorg"
    type: twitter
    account_id: demonlistorg
    poll_interval: 600          # Global Demonlist official — ranking changes, new #1 demons

  - name: "@TechnicalJL"
    type: twitter
    account_id: TechnicalJL
    poll_interval: 600          # top extreme demon player, just beat Acheron (March 2026)

  # ── Game update sources ──────────────────────────────────────────────────────

  - name: Steam News (GD)
    type: rss
    url: https://store.steampowered.com/feeds/news/app/322170
    poll_interval: 1800         # 30 min — official patch notes on Steam

  - name: RobTop Games Website
    type: scraper
    url: https://www.robtopgames.com/
    poll_interval: 3600         # 1 hr — developer blog posts

  # ── Demon list / level tracking APIs ────────────────────────────────────────

  - name: Pointercrate Demon List
    type: api
    collector: pointercrate
    base_url: https://pointercrate.com/api/v2
    poll_interval: 600          # 10 min — the primary demon list

  # AREDL — disabled: SPA (React), no server-rendered HTML for scraping
  # - name: AREDL (All Rated Extreme Demons)
  #   type: scraper
  #   url: https://aredl.net/
  #   poll_interval: 900

  # GDDP — disabled: SPA (Next.js), no server-rendered HTML for scraping
  # - name: GDDP (GD Demon Progression)
  #   type: scraper
  #   url: https://gddp.pro/
  #   poll_interval: 1800

  # ── Level data API ───────────────────────────────────────────────────────────

  - name: GDBrowser
    type: api
    collector: gdbrowser
    base_url: https://gdbrowser.com/api
    poll_interval: 900          # 15 min — daily level, weekly demon, rated levels

  # ── News / coverage sites ────────────────────────────────────────────────────

  # Dashword.net, Challenge List, GD Forum News — removed (very low content yield)

  # ── Mod / developer ecosystem ────────────────────────────────────────────────

  - name: Geode Mods Catalog
    type: scraper
    url: https://geode-sdk.org/mods
    poll_interval: 1800         # 30 min — new and updated mods

  - name: Geode SDK (GitHub releases)
    type: api
    collector: github
    repo: geode-sdk/geode
    poll_interval: 3600         # 60 min

  # Speedrun.com — disabled: Cloudflare challenge blocks server-side requests
  # - name: Speedrun.com — GD
  #   type: scraper
  #   url: https://www.speedrun.com/gmd
  #   poll_interval: 3600

  # ── YouTube channels ─────────────────────────────────────────────────────────

  - name: GD YouTube — EVW
    type: youtube
    channel_id: UC_BXQNOzX7ALIf8FkDqOahQ
    poll_interval: 1800

  - name: GD YouTube — Wulzy
    type: youtube
    channel_id: UCoJzXOukwqP96D0Uczqf74Q
    poll_interval: 1800

  - name: GD YouTube — GD Colon
    type: youtube
    channel_id: UCFDsxSlQXpLLpVScy2NmbcQ
    poll_interval: 1800

  - name: GD YouTube — Nexus
    type: youtube
    channel_id: UCZwP1iUQiAKYQp5w-9mJb_w
    poll_interval: 1800         # 1M+ subs, level showcases and extreme demons

  - name: GD YouTube — ItzBran
    type: youtube
    channel_id: UC4DmiLg94JMXUZyc3uG5kMQ
    poll_interval: 1800         # 4M+ subs, challenges, level experimentation

  - name: GD YouTube — Viprin
    type: youtube
    channel_id: UCUwapObI2gw2Tovu5oj-wng
    poll_interval: 1800         # level reviews, competitions, tutorials

  - name: GD YouTube — Juniper
    type: youtube
