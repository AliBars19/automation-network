    type: youtube
    channel_id: UCUwapObI2gw2Tovu5oj-wng
    poll_interval: 1800

  - name: GD YouTube — Juniper
    type: youtube
    channel_id: UCOE3keaPI49vGbygNwsNqgA
    poll_interval: 3600

  - name: GD YouTube — Moldy
    type: youtube
    channel_id: UCseHDTIJ6ecGo2WcNAFLFCg
